<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reconocimiento de Necesidades · Hotmart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --orange:#FF6A1A;
  --orange-deep:#E85400;
  --ink:#1D1B18;
  --gray:#726F6A;
  --gray-soft:#B6B2AB;
  --paper:#FAF7F2;
  --card:#FFFFFF;
  --line:#EDE8E0;
  --tint:#FFF0E4;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  align-items:stretch;
  justify-content:center;
}
.app{
  width:100%;
  max-width:1040px;
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}
@media (max-width:760px){
  .app{grid-template-columns:1fr;}
  .rail{display:none;}
}

/* ---------- Rail: route map, the signature element ---------- */
.rail{
  background:var(--ink);
  color:#fff;
  padding:36px 26px;
  position:relative;
  overflow:hidden;
}
.rail-brand{
  font-family:'Space Grotesk',sans-serif;
  font-size:13px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--orange);
  font-weight:700;
  margin-bottom:6px;
}
.rail-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:20px;
  font-weight:600;
  line-height:1.25;
  margin-bottom:36px;
  color:#fff;
}
.route-node{
  position:relative;
  padding-left:26px;
  padding-bottom:26px;
  font-size:13px;
  color:#8A8781;
  transition:color .3s ease;
}
.route-node:last-child{padding-bottom:0;}
.route-node::before{
  content:'';
  position:absolute;
  left:0; top:2px;
  width:11px;height:11px;
  border-radius:50%;
  background:#3A3733;
  border:2px solid #3A3733;
  transition:all .3s ease;
}
.route-node::after{
  content:'';
  position:absolute;
  left:5px; top:14px;
  width:1px;
  height:calc(100% - 8px);
  background:#3A3733;
}
.route-node:last-child::after{display:none;}
.route-node.done{color:#D8D5CE;}
.route-node.done::before{background:var(--orange);border-color:var(--orange);}
.route-node.done::after{background:var(--orange);}
.route-node.active{color:#fff;font-weight:600;}
.route-node.active::before{background:var(--paper);border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,106,26,.35);}
.route-label-sub{display:block;font-weight:400;color:#8A8781;font-size:12px;margin-top:2px;}
.route-node.active .route-label-sub{color:#C9A98A;}

/* ---------- Main panel ---------- */
.main{
  padding:44px 48px 40px;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}
.progress-track{
  height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:34px;
}
.progress-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .35s ease;}
.eyebrow{
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--orange-deep);margin-bottom:10px;
}
.q-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;font-weight:600;line-height:1.3;margin:0 0 8px;color:var(--ink);
}
.q-sub{color:var(--gray);font-size:14.5px;margin-bottom:28px;line-height:1.5;}
.card-body{flex:1;}

.field-group{margin-bottom:22px;}
.field-label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:8px;}
input[type=text],input[type=email]{
  width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:10px;
  font-size:15px;font-family:'Inter',sans-serif;color:var(--ink);background:var(--card);
  outline:none;transition:border-color .2s;
}
input[type=text]:focus,input[type=email]:focus{border-color:var(--orange);}

.opt-list{display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;
  cursor:pointer;background:var(--card);transition:border-color .15s, background .15s;
}
.opt:hover{border-color:var(--gray-soft);}
.opt.selected{border-color:var(--orange);background:var(--tint);}
.opt input{margin-top:3px;accent-color:var(--orange);flex-shrink:0;}
.opt-text{font-size:14.5px;line-height:1.4;color:var(--ink);}
.opt-text b{display:block;font-weight:600;margin-bottom:2px;}

.select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.select-grid{grid-template-columns:1fr;}}

.nav-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:32px;padding-top:22px;border-top:1px solid var(--line);
}
button{
  font-family:'Inter',sans-serif;font-weight:600;font-size:14.5px;
  border:none;border-radius:10px;padding:13px 26px;cursor:pointer;transition:opacity .15s, transform .1s;
}
button:active{transform:scale(.98);}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:disabled{background:#F0CBAE;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--gray);}
.btn-ghost:hover{color:var(--ink);}

/* ---------- Summary screen ---------- */
.summary-badge{
  display:inline-block;background:var(--tint);color:var(--orange-deep);
  font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:6px 12px;border-radius:100px;margin-bottom:16px;
}
.deliverable-name{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:600;margin:0 0 18px;}
.checklist{list-style:none;padding:0;margin:0 0 28px;}
.checklist li{
  padding:11px 0 11px 30px;border-bottom:1px solid var(--line);position:relative;font-size:14.5px;color:var(--ink);
}
.checklist li::before{content:'✓';position:absolute;left:0;color:var(--orange);font-weight:700;}
.json-box{
  background:var(--ink);color:#E9E5DE;border-radius:12px;padding:18px;
  font-family:monospace;font-size:12px;max-height:260px;overflow:auto;white-space:pre-wrap;word-break:break-word;
}
.copy-row{display:flex;gap:12px;margin-top:16px;}
</style>
</head>
<body>
<div class="app">
  <div class="rail" id="rail"></div>
  <div class="main">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="card-body" id="cardBody"></div>
  </div>
</div>

<script>

screens.a_p6 = {section:"Punto de partida", title:"¿Cuál es tu principal objetivo para los próximos 3 meses?",

  next:()=>"a2_p1"};

screens.a2_p1 = {section:"Configuración Hotmart", title:"¿Tienes cuenta creada en Hotmart?",
  type:"single", key:"h1",

// Módulo 1 — Análisis de cuenta
screens.m1_p1 = {section:"Análisis de cuenta", title:"ID o correo de tu cuenta en Hotmart",
  type:"multi", fields:[{key:"m1_id",label:"ID / correo de cuenta",kind:"text",placeholder:"tu ID o correo registrado"}],
  next:()=>"m1_p2"};
screens.m1_p2 = {section:"Análisis de cuenta", title:"¿Cuál es tu facturación mensual promedio actual?",

screens.m1_p3 = {section:"Análisis de cuenta", title:"¿Conoces tu tasa de reembolso actual?",

  next:()=>"m1_p4"};
screens.m1_p4 = {section:"Análisis de cuenta", title:"¿Conoces tu tasa de aprobación de pagos?",
  type:"single", key:"m1_4",
  options:[{value:">80",label:"Arriba del 80%"},{value:"60-80",label:"60% – 80%"},{value:"<60",label:"Debajo del 60%"},{value:"no_se",label:"No sé"}],
  next:()=>"m1_p5"};
screens.m1_p5 = {section:"Análisis de cuenta", title:"¿Usas Hotmart Community con tus alumnos?",
  type:"single", key:"m1_5",
  options:[{value:"activa",label:"Sí, está activa"},{value:"sin_uso",label:"Creada, pero sin uso"},{value:"no",label:"No la tengo"}],

screens.m1_p6 = {section:"Análisis de cuenta", title:"¿Tienes tutores o equipo de soporte al alumno?",
  type:"single", key:"m1_6",
  options:[{value:"equipo",label:"Sí, equipo dedicado"},{value:"yo",label:"Lo hago yo mismo"},{value:"no",label:"No tengo"}],

  type:"check", key:"m1_7",
  options:["Stripe","NAS / Netshow","Skool","Kajabi","Otra","Ninguna"],

screens.m3_p1 = {section:"Retención y escalamiento", title:"¿Cuánto lleva activa tu cuenta en Hotmart?",

  options:[{value:"<6m",label:"Menos de 6 meses"},{value:"6m-2a",label:"6 meses – 2 años"},{value:">2a",label:"Más de 2 años"}],

screens.m3_p2 = {section:"Retención y escalamiento", title:"¿Tienes un calendario de lanzamientos definido?",

  options:[{value:"si",label:"Sí, planeado"},{value:"oportunidad",label:"Por oportunidad"},{value:"no",label:"No tengo"}],

screens.m3_p3 = {section:"Retención y escalamiento", title:"¿Cuál es tu modelo de ingreso principal actualmente?",
  type:"single", key:"m3_3",
  options:[{value:"lanzamientos",label:"Lanzamientos"},{value:"evergreen",label:"Evergreen"},{value:"membresia",label:"Membresía"},{value:"combinado",label:"Combinado"}],
  next:()=>"m3_p4"};
screens.m3_p4 = {section:"Retención y escalamiento", title:"¿Qué porcentaje de tus ingresos viene de clientes que ya te compraron antes?",
  type:"single", key:"m3_4",
  options:[{value:"<20",label:"Menos del 20%"},{value:"20-40",label:"20% – 40%"},{value:">40",label:"Más del 40%"},{value:"no_mido",label:"No lo mido"}],
  next:()=>"m3_p5"};
screens.m3_p5 = {section:"Retención y escalamiento", title:"¿Cuál es tu principal barrera para escalar?",
  sub:"Selecciona las que apliquen.",
  type:"check", key:"m3_5",
  options:["Falta de tiempo","Falta de equipo","Falta de tráfico","Falta de producto nuevo","Falta de sistema / procesos","Falta de capital"],

screens.m3_p6 = {section:"Retención y escalamiento", title:"¿Tienes competidores directos identificados en tu nicho?",
  type:"single", key:"m3_6",
  options:[{value:"si",label:"Sí, los conozco bien"},{value:"idea",label:"Tengo una idea"},{value:"no",label:"No los conozco"}],

screens.m3_p7 = {section:"Retención y escalamiento", title:"¿Qué resultado quieres lograr en los próximos 6 meses?",
  type:"single", key:"m3_7",
  options:[{value:"duplicar",label:"Duplicar mi facturación"},{value:"diversificar",label:"Diversificar mis ingresos"},{value:"equipo",label:"Construir un equipo"},{value:"expandir",label:"Expandir a nuevos mercados"}],
  next:()=>"resumen"};

/* ============================================================
   DELIVERABLE MAPPING
   ============================================================ */
function getDeliverable(a){
  if(a.ruta === "A"){
    return {
      name:"Diagnóstico de Punto de Partida + Configuración Hotmart",
      route:"Rama A · Iniciando",
      items:[
        "Escalera de valor recomendada para el nicho declarado",
        "Ticket promedio del mercado en su categoría",
        "Herramientas Hotmart a configurar, en orden de prioridad",
        "Estructura de diversificación de producto sugerida",
        "Modelo de venta recomendado según audiencia y presupuesto",
        "Bloque de próximos pasos (30/60/90 días)"
      ]
    };
  }
  if(a.modulo === "1"){
    return {
      name:"Diagnóstico de Cuenta y Benchmarking",
      route:"Rama B · Módulo 1 — Análisis de cuenta",
      items:[
        "Diagnóstico de tasa de reembolso y aprobación vs. benchmark del nicho",
        "Insights sobre el sistema de tutores y soporte al alumno",
        "Potencial de uso de Hotmart Community y mejores prácticas",
        "Comparativa de funcionalidades y costos vs. Stripe, NAS y Skool",
        "Recomendaciones específicas por indicador fuera de rango",
        "Bloque de próximos pasos"
      ]
    };
  }
  if(a.modulo === "2"){
    return {
      name:"Diagnóstico de Tráfico Pago e Inversión",
      route:"Rama B · Módulo 2 — Tráfico pago",
      items:[
        "Diagnóstico de la estructura de pauta actual y principales brechas",
        "Benchmarking de CPL y ROAS promedio para el nicho declarado",
        "Recomendaciones de distribución de inversión por etapa del funnel",
        "Checklist de configuración de píxel y seguimiento de conversiones",
        "Plan de escalamiento de pauta según facturación y ROAS objetivo",
        "Bloque de próximos pasos"
      ]
    };
  }
  return {
    name:"Diagnóstico de Retención y Escalamiento",
    route:"Rama B · Módulo 3 — Retención y escalamiento",
    items:[
      "Cronograma de lanzamientos recomendado según nicho y data de Hotmart",
      "Benchmarking de mercado: facturación, frecuencia y estacionalidad",
      "Análisis de mercado y posicionamiento frente a la competencia",
      "Estrategia de recompra para incrementar clientes recurrentes",
      "Hoja de ruta de diversificación de ingresos",
      "Bloque de próximos pasos"
    ]
  };
}

/* ============================================================
   RENDER ENGINE
   ============================================================ */
let currentId = "entrada";

function railSteps(){
  const a = state.answers;
  const steps = [{id:"entrada", label:"Entrada", sub:"Correo, nombre, nicho"}];
  steps.push({id:"segmentacion", label:"Segmentación", sub:"¿Iniciando o cuenta activa?"});
  if(!a.ruta){ steps.push({id:"?", label:"Ruta por definir", sub:""}); return steps; }
  if(a.ruta==="A"){
    steps.push({id:"a_block", label:"Punto de partida", sub:"6 preguntas"});
    steps.push({id:"a2_block", label:"Config. Hotmart", sub:"6 preguntas"});
  } else {
    steps.push({id:"b_modulo", label:"Elección de módulo", sub:"Análisis / Tráfico / Retención"});
    const modLabel = a.modulo==="1"?"Módulo 1 · Análisis de cuenta": a.modulo==="2"?"Módulo 2 · Tráfico pago": a.modulo==="3"?"Módulo 3 · Retención":"Módulo elegido";
    steps.push({id:"b_block", label:modLabel, sub:"Preguntas específicas"});
  }
  steps.push({id:"resumen", label:"Entrega", sub:"Diagnóstico personalizado"});
  return steps;
}

function currentGroupId(){
  if(currentId==="entrada") return "entrada";
  if(currentId==="segmentacion") return "segmentacion";
  if(currentId.startsWith("a2_")) return "a2_block";
  if(currentId.startsWith("a_")) return "a_block";
  if(currentId==="b_modulo") return "b_modulo";
  if(currentId.startsWith("m1_")||currentId.startsWith("m2_")||currentId.startsWith("m3_")) return "b_block";
  if(currentId==="resumen") return "resumen";
  return currentId;
}

function renderRail(){
  const steps = railSteps();
  const activeGroup = currentGroupId();
  let passedActive = false;
  const html = steps.map(s=>{
    let cls = "route-node";
    if(s.id === activeGroup){ cls += " active"; passedActive = true; }
    else if(!passedActive && s.id!=="?"){ cls += " done"; }
    return `<div class="${cls}"><b>${s.label}</b><span class="route-label-sub">${s.sub}</span></div>`;
  }).join("");
  document.getElementById("rail").innerHTML = `
    <div class="rail-brand">Hotmart · New Business</div>
    <div class="rail-title">Reconocimiento de Necesidades</div>
    ${html}`;
}

function estimateProgress(){
  // rough step counters per branch, for the progress bar only
  const a = state.answers;
  const order = ["entrada","segmentacion"];
  if(a.ruta==="A"){ order.push(...["a_p1","a_p2","a_p3","a_p4","a_p5","a_p6","a2_p1","a2_p2","a2_p3","a2_p4","a2_p5","a2_p6"]); }
  else if(a.ruta==="B"){
    order.push("b_modulo");
    if(a.modulo==="1") order.push(...["m1_p1","m1_p2","m1_p3","m1_p4","m1_p5","m1_p6","m1_p7"]);
    else if(a.modulo==="2") order.push(...["m2_p1","m2_p2","m2_p3","m2_p4","m2_p5","m2_p6"]);
    else if(a.modulo==="3") order.push(...["m3_p1","m3_p2","m3_p3","m3_p4","m3_p5","m3_p6","m3_p7"]);
  } else {
    order.push("b_modulo?");
  }
  order.push("resumen");
  const idx = order.indexOf(currentId);
  const pct = idx<0 ? 8 : Math.round(((idx+1)/order.length)*100);
  document.getElementById("progressFill").style.width = pct+"%";
}

function isValid(screen){
  if(screen.type==="multi"){
    return screen.fields.every(f=> (state.answers[f.key]||"").toString().trim().length>0);
  }
  if(screen.type==="single"){ return !!state.answers[screen.key]; }
  if(screen.type==="check"){ return (state.answers[screen.key]||[]).length>0; }
  return true;
}

function renderScreen(){
  if(currentId === "resumen"){ renderSummary(); renderRail(); estimateProgress(); return; }
  const s = screens[currentId];
  let body = `<div class="eyebrow">${s.section}</div><h1 class="q-title">${s.title}</h1>`;
  if(s.sub) body += `<p class="q-sub">${s.sub}</p>`;

  if(s.type==="multi"){
    body += s.fields.map(f=>{
      if(f.kind==="select"){
        const val = state.answers[f.key]||"";
        return `<div class="field-group"><label class="field-label">${f.label}</label>
          <select id="f_${f.key}" onchange="setAnswer('${f.key}', this.value)"
            style="width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;background:#fff;color:var(--ink);">
            <option value="" ${val?"":"selected"} disabled>Selecciona una opción</option>
            ${f.options.map(o=>`<option value="${o}" ${val===o?"selected":""}>${o}</option>`).join("")}
          </select></div>`;
      }
      const val = state.answers[f.key]||"";
      return `<div class="field-group"><label class="field-label">${f.label}</label>
        <input type="${f.kind}" id="f_${f.key}" value="${val}" placeholder="${f.placeholder||""}"
          oninput="setAnswer('${f.key}', this.value)"></div>`;
    }).join("");
  }

  if(s.type==="single"){
    body += `<div class="opt-list">` + s.options.map(o=>{
      const sel = state.answers[s.key]===o.value;
      return `<label class="opt ${sel?"selected":""}" onclick="selectSingle('${s.key}','${o.value}')">
        <input type="radio" name="${s.key}" ${sel?"checked":""} readonly>
        <span class="opt-text"><b>${o.label}</b>${o.desc?o.desc:""}</span></label>`;
    }).join("") + `</div>`;
  }

  if(s.type==="check"){
    const current = state.answers[s.key]||[];
    body += `<div class="opt-list">` + s.options.map(o=>{
      const sel = current.includes(o);
      return `<label class="opt ${sel?"selected":""}" onclick="toggleCheck('${s.key}','${o}')">
        <input type="checkbox" ${sel?"checked":""} readonly>
        <span class="opt-text">${o}</span></label>`;
    }).join("") + `</div>`;
  }

  const canGoBack = state.history.length>0;
  const valid = isValid(s);
  body += `<div class="nav-row">
      <button class="btn-ghost" onclick="goBack()" ${canGoBack?"":"disabled style='visibility:hidden'"}>← Anterior</button>
      <button class="btn-primary" id="nextBtn" onclick="goNext()" ${valid?"":"disabled"}>Siguiente →</button>
    </div>`;

  document.getElementById("cardBody").innerHTML = body;
  renderRail();
  estimateProgress();
}

function setAnswer(key,val){
  state.answers[key]=val;
  document.getElementById("nextBtn").disabled = !isValid(screens[currentId]);
}
function selectSingle(key,val){
  state.answers[key]=val;
  renderScreen();
}
function toggleCheck(key,val){
  const arr = state.answers[key]||[];
  const i = arr.indexOf(val);
  if(i>-1) arr.splice(i,1); else arr.push(val);
  state.answers[key]=arr;
  renderScreen();
}
function goNext(){
  const s = screens[currentId];
  if(!isValid(s)) return;
  state.history.push(currentId);
  currentId = s.next(state.answers);
  renderScreen();
  document.querySelector('.main').scrollTop = 0;
  window.scrollTo(0,0);
}
function goBack(){
  if(state.history.length===0) return;
  currentId = state.history.pop();
  renderScreen();
  window.scrollTo(0,0);
}

function buildPayload(){
  const a = { ...state.answers };
  const email = a.email, nombre = a.nombre, nicho = a.nicho, ruta = a.ruta, modulo = a.modulo || "";
  delete a.email; delete a.nombre; delete a.nicho; delete a.ruta; delete a.modulo;
  return { email, nombre, nicho, ruta, modulo, respuestas: a };
}

function renderSummary(){
  const d = getDeliverable(state.answers);
  const payload = buildPayload();

  // Pantalla de "enviando" mientras se hace el POST
  document.getElementById("cardBody").innerHTML = `
    <div class="summary-badge">${d.route}</div>
    <h1 class="deliverable-name">Procesando tu diagnóstico…</h1>
    <p class="q-sub">Un momento, estamos preparando todo para ${state.answers.nombre||"ti"}.</p>
  `;

  submitToBackend(payload)
    .then(()=> renderThankYou(d, true))
    .catch(()=> renderThankYou(d, false));
}

function submitToBackend(payload){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf("PEGA_AQUI") === 0){
    return Promise.reject(new Error("Apps Script URL no configurada"));
  }
  const body = new URLSearchParams();
  body.append("data", JSON.stringify(payload));
  // mode: 'no-cors' -> Apps Script bloquea la lectura de la respuesta desde el
  // navegador, pero sí procesa el request. No esperamos ni leemos la respuesta.
  return fetch(APPS_SCRIPT_URL, { method:"POST", mode:"no-cors", body })
    .then(()=> true);
}

function renderThankYou(d, sentOk){
  document.getElementById("cardBody").innerHTML = `
    <div class="summary-badge">${d.route}</div>
    <h1 class="deliverable-name">¡Gracias, ${state.answers.nombre||""}!</h1>
    <p class="q-sub">Ya recibimos tus respuestas. Tu asesor de Hotmart está preparando tu <b>${d.name}</b> y se pondrá en contacto contigo muy pronto para entregártelo y revisarlo juntos.</p>
    <ul class="checklist">${d.items.map(i=>`<li>${i}</li>`).join("")}</ul>
    ${sentOk ? "" : `<p style="font-size:12.5px;color:#B23A00;background:#FFF0E4;padding:12px 14px;border-radius:8px;">No pudimos confirmar el envío automático (revisa que APPS_SCRIPT_URL esté configurado en el HTML). El onboarder puede tomar tus datos manualmente mientras se corrige.</p>`}
    <div class="copy-row">
      <button class="btn-ghost" onclick="restart()">Hacer otro diagnóstico</button>
    </div>
  `;
}

function restart(){
  state.answers = {}; state.history = []; currentId = "entrada";
  renderScreen();
}

renderScreen();
</script>
</body>
</html>
